services:
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: io-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qg"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: io-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "/scripts/kafka-init.sh"]
    volumes:
      - ./scripts:/scripts
    restart: "no"

  postgres:
    image: postgres:16-alpine
    container_name: io-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: io_user
      POSTGRES_PASSWORD: io_password
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres-init.sh:/docker-entrypoint-initdb.d/postgres-init.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U io_user -d card_issuer && pg_isready -U io_user -d card_processor"]
      interval: 5s
      timeout: 5s
      retries: 10

  card-issuer:
    build:
      context: .
      dockerfile: apps/card-issuer/Dockerfile
    container_name: io-card-issuer
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      SERVICE_NAME: card-issuer
      KAFKA_BROKERS: kafka:29092
      DATABASE_URL: postgresql://io_user:io_password@io-postgres:5432/card_issuer?schema=public
      KAFKAJS_NO_PARTITIONER_WARNING: 1
    depends_on:
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

  card-processor:
    build:
      context: .
      dockerfile: apps/card-processor/Dockerfile
    container_name: io-card-processor
    environment:
      SERVICE_NAME: card-processor
      KAFKA_BROKERS: kafka:29092
      DATABASE_URL: postgresql://io_user:io_password@io-postgres:5432/card_processor?schema=public
      KAFKAJS_NO_PARTITIONER_WARNING: 1
      CARD_HASH_SECRET: d31fcd28468b7b2aaf8782d1d5fd8198b9a1f410f58406b59e579397ff2741fe
    depends_on:
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

volumes:
  postgres_data:
